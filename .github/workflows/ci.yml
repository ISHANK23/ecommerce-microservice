name: CI - Build and Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test-services:
    name: Test Microservices
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          [
            product-service,
            payment-service,
            order-service,
            email-service,
            analytic-service,
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Run tests (if available)
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present

  test-client:
    name: Test Next.js Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/client/package-lock.json

      - name: Install dependencies
        working-directory: services/client
        run: npm ci

      - name: Run ESLint
        working-directory: services/client
        run: npm run lint

      - name: Build Next.js
        working-directory: services/client
        run: npm run build

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-services, test-client]

    strategy:
      matrix:
        service:
          [
            client,
            product-service,
            payment-service,
            order-service,
            email-service,
            analytic-service,
          ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ecommerce/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker images | grep ecommerce/${{ matrix.service }}
