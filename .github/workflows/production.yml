name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-production:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          echo "🔐 Validating required secrets..."
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "❌ Error: EC2_SSH_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "❌ Error: EC2_HOST secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "❌ Error: EC2_USER secret is not set"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create backup
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -T $EC2_USER@$EC2_HOST << 'ENDSSH'
            echo "📦 Creating backup..."
            cd ~/ecommerce-microservice
            
            # Check if MySQL container is running before backup
            if docker-compose ps mysql | grep -q "Up"; then
              BACKUP_FILE=~/backups/backup-$(date +%Y%m%d-%H%M%S).sql
              docker-compose exec -T mysql mysqldump -u root -prootpassword ecommerce > $BACKUP_FILE
              echo "✅ Database backup created: $BACKUP_FILE"
              
              # Keep only last 5 backups
              cd ~/backups
              ls -t backup-*.sql | tail -n +6 | xargs -r rm
              echo "✅ Old backups cleaned up"
            else
              echo "⚠️  MySQL container not running, skipping backup"
            fi
          ENDSSH

      - name: Deploy with zero-downtime
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -T $EC2_USER@$EC2_HOST << 'ENDSSH'
            set -e
            
            echo "🚀 Starting production deployment..."
            
            cd ~/ecommerce-microservice
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Create .env file with proper configuration
            echo "⚙️  Creating environment configuration..."
            PUBLIC_IP=$(curl -s http://checkip.amazonaws.com)
            cat > .env << EOF
NEXT_PUBLIC_PRODUCT_SERVICE_URL=http://${PUBLIC_IP}:8001
NEXT_PUBLIC_PAYMENT_SERVICE_URL=http://${PUBLIC_IP}:8000
CORS_ORIGIN=*
EOF
            echo "✅ Environment configuration created"
            
            # Build new images
            echo "🔨 Building new images..."
            docker-compose build
            
            # Rolling update - update services one by one
            echo "🔄 Performing rolling update..."
            
            # Update backend services first
            for service in analytic-service email-service order-service payment-service product-service; do
              echo "Updating $service..."
              docker-compose up -d --no-deps --build $service
              sleep 5
            done
            
            # Update client last
            echo "Updating client..."
            docker-compose up -d --no-deps --build client
            
            # Clean up
            echo "🧹 Cleaning up..."
            docker image prune -f
            
            # Health check
            echo "✅ Running health checks..."
            sleep 20
            docker-compose ps
            
            echo "🎉 Production deployment completed!"
          ENDSSH

      - name: Run smoke tests
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "🧪 Running smoke tests..."

          # Test frontend
          if curl -f -m 10 http://$EC2_HOST:3000 > /dev/null 2>&1; then
            echo "✅ Frontend is up"
          else
            echo "❌ Frontend is down"
            exit 1
          fi

          # Test product API
          if curl -f -m 10 http://$EC2_HOST:8001/health > /dev/null 2>&1; then
            echo "✅ Product API is up"
          else
            echo "❌ Product API is down"
            exit 1
          fi

          # Test payment API
          if curl -f -m 10 http://$EC2_HOST:8000 > /dev/null 2>&1; then
            echo "✅ Payment API is up"
          else
            echo "⚠️ Payment API health check skipped (no health endpoint)"
          fi

      - name: Rollback on failure
        if: failure()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          echo "❌ Deployment failed, attempting rollback..."
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -T $EC2_USER@$EC2_HOST << 'ENDSSH'
            cd ~/ecommerce-microservice
            git reset --hard HEAD~1
            docker-compose up -d --build
            echo "⏮️ Rollback completed"
          ENDSSH
