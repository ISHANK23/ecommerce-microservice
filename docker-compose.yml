services:
  # ─── Infrastructure ─────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    restart: unless-stopped
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=MkU3OEVCNTcwNTJENDM2Qk
    ports:
      - "9094:9094"
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_READONLY=false
    networks:
      - app-network

  # ─── Microservices ───────────────────────────────────────────────────────────

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
      cache_from:
        - product-service:latest
    image: product-service:latest
    container_name: product-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=ecommerce
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
      cache_from:
        - payment-service:latest
    image: payment-service:latest
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
      cache_from:
        - order-service:latest
    image: order-service:latest
    container_name: order-service
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  analytic-service:
    build:
      context: ./services/analytic-service
      dockerfile: Dockerfile
      cache_from:
        - analytic-service:latest
    image: analytic-service:latest
    container_name: analytic-service
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  email-service:
    build:
      context: ./services/email-service
      dockerfile: Dockerfile
      cache_from:
        - email-service:latest
    image: email-service:latest
    container_name: email-service
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  # ─── Frontend ────────────────────────────────────────────────────────────────

  client:
    build:
      context: ./services/client
      dockerfile: Dockerfile
      cache_from:
        - client:latest
      args:
        - NEXT_PUBLIC_PRODUCT_SERVICE_URL=${NEXT_PUBLIC_PRODUCT_SERVICE_URL:-http://3.95.239.92:8001}
        - NEXT_PUBLIC_PAYMENT_SERVICE_URL=${NEXT_PUBLIC_PAYMENT_SERVICE_URL:-http://3.95.239.92:8000}
    image: client:latest
    container_name: client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_PRODUCT_SERVICE_URL=${NEXT_PUBLIC_PRODUCT_SERVICE_URL:-http://3.95.239.92:8001}
      - NEXT_PUBLIC_PAYMENT_SERVICE_URL=${NEXT_PUBLIC_PAYMENT_SERVICE_URL:-http://3.95.239.92:8000}
    depends_on:
      - product-service
      - payment-service
    networks:
      - app-network

# ─── Shared network & volumes ──────────────────────────────────────────────────

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
